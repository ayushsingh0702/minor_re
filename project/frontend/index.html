<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Credit Card Scoring Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="main-container">
        <div class="navbar">
            <div class="user-info">Bank Logo / Portal</div>
            <div>
                <a href="login.html" class="btn-logout" style="margin-right: 10px;">Login</a>
                <a href="register.html" class="btn-primary" style="padding: 8px 16px;">Register</a>
            </div>
        </div>

        <div class="header">
            <h1>Credit Risk Assessment</h1>
            <p>Enterprise-grade credit eligibility evaluation system</p>
        </div>

        <div class="container">
            <div class="form-section">
                <h2>Enter Your Details</h2>
                <form id="predict-form">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" min="18" max="100" placeholder="Enter your age" required/>
                    </div>
                    <div class="form-group">
                        <label for="income">Annual Income ($)</label>
                        <input type="number" id="income" min="0" placeholder="Enter annual income" required/>
                    </div>
                    <div class="form-group">
                        <label for="credit_score">Credit Score</label>
                        <input type="number" id="credit_score" min="300" max="850" placeholder="Enter credit score (300-850)" required/>
                    </div>
                    <div class="form-group">
                        <label for="loan_amount">Loan Amount ($)</label>
                        <input type="number" id="loan_amount" min="0" placeholder="Enter loan amount" required/>
                    </div>
                    <button type="submit" class="btn-predict">Analyze Risk Profile</button>
                </form>
            </div>

            <div id="result" class="result-section hidden"></div>
        </div>

        <div class="history-section">
            <h2>Prediction History</h2>
            <button id="load-history" class="btn-history">Load History</button>
            <div class="table-wrapper">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>Age</th><th>Income</th><th>Credit Score</th><th>Loan Amount</th><th>Result</th><th>Probability</th><th>Time</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
