<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - Credit Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>

</head>
<body>
    <div class="main-container">
        <div class="navbar">
            <div class="user-info">Welcome, <span id="admin-name">Admin</span>! (Administrator)</div>
            <button class="btn-logout" id="logout-btn">Logout</button>
        </div>

        <div class="header">
            <h1>Admin Dashboard</h1>
            <p>System Overview & All Applications</p>
        </div>

        <div class="admin-section">
            <h2>Registered Users</h2>
            <div class="table-wrapper">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="admin-section">
            <h2>Usage Summary</h2>
            <pre id="usage-summary">Loading...</pre>
        </div>

        <div class="admin-section">
            <h2>All Credit Applications</h2>
            <div class="table-wrapper">
                <table id="apps-table">
                    <thead>
                        <tr>
                            <th>User ID</th><th>Time</th><th>Amount</th><th>Score</th><th>Risk</th><th>Details</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
