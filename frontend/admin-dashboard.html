<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - Credit Predictor</title>
    <link rel="stylesheet" href="style.css"/>
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .user-info { font-weight: bold; color: #333; }
        .btn-logout {
            padding: 8px 15px;
            background: #ff006e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="navbar">
            <div class="user-info">Welcome, <span id="admin-name">Admin</span>! (Administrator)</div>
            <button class="btn-logout" id="logout-btn">Logout</button>
        </div>

        <div class="header">
            <h1>Admin Dashboard</h1>
            <p>System Overview & All Applications</p>
        </div>

        <div class="admin-section">
            <h2>Registered Users</h2>
            <div class="table-wrapper">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="admin-section">
            <h2>Usage Summary</h2>
            <pre id="usage-summary">Loading...</pre>
        </div>

        <div class="admin-section">
            <h2>All Credit Applications</h2>
            <div class="table-wrapper">
                <table id="apps-table">
                    <thead>
                        <tr>
                            <th>User ID</th><th>Time</th><th>Amount</th><th>Score</th><th>Risk</th><th>Details</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
