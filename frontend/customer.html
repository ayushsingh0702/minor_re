<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Dashboard - Credit Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>

</head>
<body>
    <div class="main-container">
        <div class="navbar">
            <div class="user-info">Welcome, <span id="user-name">Customer</span>!</div>
            <button class="btn-logout" id="logout-btn">Logout</button>
        </div>

        <div class="header">
            <h1>Credit Risk Predictor</h1>
            <p>Assess your loan eligibility instantly</p>
        </div>

        <div class="container">
            <div class="form-section">
                <h2>New Application</h2>
                <form id="predict-form">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" min="18" max="100" required/>
                    </div>
                    <div class="form-group">
                        <label for="income">Annual Income ($)</label>
                        <input type="number" id="income" min="0" required/>
                    </div>
                    <div class="form-group">
                        <label for="credit_score">Credit Score</label>
                        <input type="number" id="credit_score" min="300" max="850" required/>
                    </div>
                    <div class="form-group">
                        <label for="loan_amount">Loan Amount ($)</label>
                        <input type="number" id="loan_amount" min="0" required/>
                    </div>
                    <div class="form-group">
                        <label for="employment_status">Employment Status</label>
                        <select id="employment_status" required>
                            <option value="EMPLOYED">Employed</option>
                            <option value="SELF_EMPLOYED">Self Employed</option>
                            <option value="UNEMPLOYED">Unemployed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="credit_utilization">Credit Utilization (%)</label>
                        <input type="number" id="credit_utilization" min="0" max="100" step="0.1" required/>
                    </div>
                    <div class="form-group">
                        <label for="existing_loans">Existing Loans (Count)</label>
                        <input type="number" id="existing_loans" min="0" required/>
                    </div>
                    <div class="form-group">
                        <label for="payment_history">Payment History</label>
                        <select id="payment_history" required>
                            <option value="GOOD">Good (No late payments)</option>
                            <option value="FAIR">Fair (Few late payments)</option>
                            <option value="POOR">Poor (Frequent defaults)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-predict">Analyze Risk</button>
                </form>
            </div>

            <div id="result" class="result-section hidden"></div>
        </div>

        <div class="history-section">
            <h2>My History</h2>
            <button id="load-history" class="btn-history">Refresh History</button>
            <div class="table-wrapper">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Time</th><th>Amount</th><th>Score</th><th>Risk</th><th>Details</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="customer.js"></script>
</body>
</html>
